# Full dashboard with 3 tabs (views). In HA: create a new dashboard, then set its config to this
# entire file (Dashboards → your dashboard → ⋮ → Edit → Dashboard configuration → paste all).
views:
  - title: Map
    path: map
    icon: mdi:map-marker-radius
    panel: true
    cards:
      - type: custom:map-card
        title: RAK10701-Plus Field Tester
        focus_entity: sensor.rak10701_plus_location
        zoom: 14
        card_size: 8
        theme_mode: auto
        history_start: 48 hours ago
        history_end: now
        entities:
          - entity: sensor.rak10701_plus_location
            display: attribute
            attribute: snr
            prefix: 'SNR '
            suffix: ' dB'
            size: 44
            color: '#1565C0'
            circle: auto
            history_show_lines: true
            history_show_dots: true
            tap_action:
              action: more-info
  - title: Signal heat map
    path: heatmap
    icon: mdi:heat-map
    panel: true
    cards:
      - type: custom:map-card
        title: Signal quality heat map (SNR at lat/long)
        focus_entity: sensor.rak10701_plus_location
        zoom: 14
        card_size: 8
        theme_mode: auto
        history_start: 48 hours ago
        history_end: now
        plugins:
          - name: heat
            url: /local/heat-layer.js
            options:
              entity_id: sensor.rak10701_plus_location
              intensity_attribute: snr
              cell_radius_deg: 0.002
              hours_ago: 48
              show_numbers: true
        entities:
          - entity: sensor.rak10701_plus_location
            display: attribute
            attribute: snr
            prefix: 'SNR '
            suffix: ' dB'
            size: 36
            color: '#1565C0'
            tap_action:
              action: more-info
  - title: Overview
    path: lorawan
    icon: mdi:radio-tower
    panel: false
    cards:
      - type: glance
        title: Live
        show_name: true
        show_state: true
        state_color: true
        columns: 5
        entities:
          - entity: sensor.rak10701_plus_field_tester_signal_strength
            name: RSSI
          - entity: sensor.rak10701_plus_field_tester_signal_quality
            name: SNR
          - entity: sensor.rak10701_plus_field_tester_altitude
            name: Altitude
          - entity: sensor.rak10701_plus_field_tester_satellites
            name: Sats
          - entity: sensor.rak10701_plus_field_tester_last_update
            name: Updated
      - type: map
        title: Location
        aspect_ratio: '2:3'
        auto_fit: true
        default_zoom: 14
        theme_mode: auto
        entities:
          - entity: sensor.rak10701_plus_location
            name: Field Tester
        hours_to_show: 24
      - type: horizontal-stack
        cards:
          - type: entities
            title: Gateway
            icon: mdi:router-wireless
            show_header_toggle: false
            entities:
              - entity: sensor.rak10701_plus_field_tester_gateway
          - type: entities
            title: GPS
            icon: mdi:crosshairs-gps
            show_header_toggle: false
            entities:
              - entity: sensor.rak10701_plus_field_tester_gps_accuracy
                name: Accuracy
              - entity: sensor.rak10701_plus_field_tester_hdop
                name: HDOP
