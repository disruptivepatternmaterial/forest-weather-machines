# Minimal dashboard: built-in map only, sensor.rak10701_plus_field_tester_location, Feb 1–Feb 11
# In HA: create dashboard → Edit → Dashboard configuration → paste this entire file.
# Centering: zone.home is included so the map fits both your track and home.
# Base map: the core map card cannot change tiles. Use custom:map-card (e.g. ha-map-card from HACS) for tile_layer_url.

views:
  - title: Map
    path: map
    panel: true
    cards:
      - type: map
        default_zoom: 12
        hours_to_show: 264
        entities:
          - entity: zone.home
            focus: true
          - entity: sensor.rak10701_plus_field_tester_location
            focus: true
