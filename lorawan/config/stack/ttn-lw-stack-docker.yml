# The Things Stack Open Source - Stack configuration
# Replace "thethings.example.com" with your server hostname or "localhost" for local dev.
# Generate HTTP keys: block-key (openssl rand -hex 32), hash-key (openssl rand -hex 64).
# See: https://www.thethingsindustries.com/docs/enterprise/docker/configuration/

# Identity Server
is:
  email:
    sender-name: "The Things Stack"
    sender-address: "noreply@thethings.example.com"
    network:
      name: "The Things Stack"
      console-url: "https://thethings.example.com/console"
      identity-server-url: "https://thethings.example.com/oauth"
  oauth:
    ui:
      canonical-url: "https://thethings.example.com/oauth"
      is:
        base-url: "https://thethings.example.com/api/v3"

# HTTP server - REQUIRED: set block-key and hash-key (see README)
http:
  cookie:
    block-key: ""   # openssl rand -hex 32
    hash-key: ""    # openssl rand -hex 64
  metrics:
    password: "metrics"
  pprof:
    password: "pprof"

# TLS - use acme (Let's Encrypt) or uncomment custom cert section below
tls:
  source: acme
  acme:
    dir: /var/lib/acme
    email: "you@thethings.example.com"
    hosts: ["thethings.example.com"]
    default-host: "thethings.example.com"
# Custom certificates (uncomment and mount certs in docker-compose):
# tls:
#   source: file
#   root-ca: /run/secrets/ca.pem
#   certificate: /run/secrets/cert.pem
#   key: /run/secrets/key.pem

# Gateway Server
gs:
  mqtt:
    public-address: "thethings.example.com:1882"
    public-tls-address: "thethings.example.com:8882"
  mqtt-v2:
    public-address: "thethings.example.com:1881"
    public-tls-address: "thethings.example.com:8881"

# Gateway Configuration Server (Basic Station)
gcs:
  basic-station:
    default:
      lns-uri: "wss://thethings.example.com:8887"

# Console (Web UI)
console:
  ui:
    canonical-url: "https://thethings.example.com/console"
    account-url: "https://thethings.example.com/oauth"
    is:
      base-url: "https://thethings.example.com/api/v3"
    gs:
      base-url: "https://thethings.example.com/api/v3"
    ns:
      base-url: "https://thethings.example.com/api/v3"
    as:
      base-url: "https://thethings.example.com/api/v3"
    js:
      base-url: "https://thethings.example.com/api/v3"
    gcs:
      base-url: "https://thethings.example.com/api/v3"
    qrg:
      base-url: "https://thethings.example.com/api/v3"
    edtc:
      base-url: "https://thethings.example.com/api/v3"
    dcs:
      base-url: "https://thethings.example.com/api/v3"
  oauth:
    authorize-url: "https://thethings.example.com/oauth/authorize"
    token-url: "https://thethings.example.com/oauth/token"
    logout-url: "https://thethings.example.com/oauth/logout"
    client-id: "console"
    client-secret: "console"  # change in production

# Application Server (MQTT, webhooks)
as:
  mqtt:
    public-address: "thethings.example.com:1883"
    public-tls-address: "thethings.example.com:8883"
  webhooks:
    downlink:
      public-address: "thethings.example.com:1885/api/v3"

# Gateway Controller (optional; set enabled: false for minimal setup)
ttgc:
  enabled: true
  domain: thethings.example.com
  tls:
    source: acme
  # For custom certs:
  # tls:
  #   source: file
  #   certificate: /run/secrets/cert.pem
  #   key: /run/secrets/key.pem
